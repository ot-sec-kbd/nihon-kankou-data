AWSTemplateFormatVersion: '2010-09-09'
Description: 'S3 Static Website Hosting for Japan 47 GO Nihon Kankou Data'

Parameters:
  Environment:
    Type: String
    Default: stg
    AllowedValues:
      - stg
      - prod
    Description: Environment name (stg or prod)

Conditions:
  IsStg: !Equals [!Ref Environment, 'stg']

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Join
        - ''
        - - !Ref Environment
          - '-japan47go-nihon-kankou-data'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: Japan47GO
        - Key: Service
          Value: NihonKankouData

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontOAI
            Effect: Allow
            Principal:
              CanonicalUser: !GetAtt CloudFrontOriginAccessIdentity.S3CanonicalUserId
            Action:
              - s3:GetObject
            Resource: !Sub '${S3Bucket.Arn}/*'

  CloudFrontOriginAccessIdentity:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Sub 'OAI for ${Environment}-japan47go-nihon-kankou-data-bucket'


  BasicAuthFunction:
    Type: AWS::CloudFront::Function
    Condition: IsStg
    Properties:
      Name: !Sub '${Environment}-nihon-kankou-basic-auth'
      AutoPublish: true
      FunctionConfig:
        Comment: Basic authentication for STG environment
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
            var request = event.request;
            var headers = request.headers;
            var authString = "Basic bnRhMjAyNTpudGEyMDI1";
            if (
                typeof headers.authorization === "undefined" ||
                headers.authorization.value !== authString
            ) {
                return {
                    statusCode: 401,
                    statusDescription: "Unauthorized",
                    headers: {
                        "www-authenticate": { value: "Basic realm=\"Enter credentials\"" }
                    }
                };
            }
            return request;
        }

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub '${Environment} - Japan 47 GO Nihon Kankou Data'
        DefaultRootObject: getting-started.html
        Enabled: true
        HttpVersion: http2
        Origins:
          - DomainName: !GetAtt S3Bucket.RegionalDomainName
            Id: !Sub 'S3-${S3Bucket}'
            S3OriginConfig:
              OriginAccessIdentity: !Sub 'origin-access-identity/cloudfront/${CloudFrontOriginAccessIdentity}'
        DefaultCacheBehavior:
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          TargetOriginId: !Sub 'S3-${S3Bucket}'
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          FunctionAssociations: !If
            - IsStg
            - - EventType: viewer-request
                FunctionARN: !GetAtt BasicAuthFunction.FunctionARN
            - !Ref 'AWS::NoValue'
          MinTTL: 0
          DefaultTTL: 86400
          MaxTTL: 31536000
        PriceClass: PriceClass_200
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 404
            ResponsePagePath: /error.html
            ErrorCachingMinTTL: 300
          - ErrorCode: 403
            ResponseCode: 403
            ResponsePagePath: /error.html
            ErrorCachingMinTTL: 300

Outputs:
  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref S3Bucket
    Export:
      Name: !Sub '${AWS::StackName}-BucketName'

  CloudFrontURL:
    Description: URL of the CloudFront distribution
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'
    Export:
      Name: !Sub '${AWS::StackName}-CloudFrontURL'

  CloudFrontDistributionId:
    Description: ID of the CloudFront distribution
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub '${AWS::StackName}-CloudFrontDistributionId'

